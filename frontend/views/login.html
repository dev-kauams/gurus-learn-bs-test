<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/components.css" />
</head>
<body class="flex justify-center items-center">
    <div class="card-login">
        <form action="/login" method="POST" class="form-login">
            <h2>Login</h2>
            <div class="field">
                <input type="text" id="username" name="username" placeholder=" " required>
                <label for="username">Username</label>
            </div>
            <div class="field">
                <input type="password" id="password" name="password" placeholder=" " required>
                <label for="password">Password</label>
            </div>
            <button type="submit" id="login_button">Login</button>
            <p id="register_link">Don't have an account? Registra ent prr</p>
        </form>

        <form action="/register" method="POST" class="form-register">
            <h2>Register</h2>
            <div class="field">
                <input type="text" id="username" name="username" placeholder=" " required>
                <label for="username">Username</label>
            </div>
            <div class="field">
                <input type="password" id="password" name="password" placeholder=" " required>
                <label for="password">Password</label>
            </div>
            <div class="field">
            <input type="email" name="email" id="email" placeholder=" " required>
            <label for="email">Email</label>
            </div>
            <button type="submit" id="register_button">Register</button>
            <p id="login_link">Already have an account? Loga nesse krl</p>
        </form>

        <img src="../assets/img/login.svg" alt="Login Image">
    </div>
    <script src="../../backend/login.js"></script>
    <script src="../assets/js/script.js"></script>
</body>
</html>
